# Canonical Harbor publish — secrets: HARBOR_HOST, HARBOR_USER, HARBOR_PASS, HARBOR_PROJECT
# IMAGE_REPO must match repo name (e.g. daletdex-ltc-worker).

name: docker-harbor

on:
  push:
    tags: ["v*.*.*", "*.*.*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Harbor tag (e.g. v1.0.0); required for manual runs without git tag"
        required: false
        type: string

concurrency:
  group: harbor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref || (inputs.image_tag != '' && format('refs/tags/{0}', inputs.image_tag) || github.ref) }}

      - name: Resolve Harbor settings
        id: harbor
        shell: bash
        env:
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
        run: |
          set -euo pipefail
          REGISTRY="${HARBOR_HOST:-}"
          PROJECT="${HARBOR_PROJECT:-}"
          if [[ -z "${REGISTRY}" ]]; then
            echo "HARBOR_HOST must be set (hostname only, e.g. registry.example.com)" >&2
            exit 1
          fi
          if [[ -z "${PROJECT}" ]]; then
            echo "HARBOR_PROJECT must be set" >&2
            exit 1
          fi
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="${REGISTRY%%/*}"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "project=${PROJECT}" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "Push tag vX.Y.Z or workflow_dispatch with image_tag." >&2
            exit 1
          fi

      - uses: docker/login-action@v4
        with:
          registry: ${{ steps.harbor.outputs.registry }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASS }}

      - name: Build & push
        env:
          IMAGE_REPO: daletdex-caddy
          DOCKERFILE: Dockerfile
          CONTEXT: .
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
          IMAGE="${{ steps.harbor.outputs.registry }}/${{ steps.harbor.outputs.project }}/${IMAGE_REPO}:${TAG}"
          docker build --pull -f "${DOCKERFILE}" -t "${IMAGE}" "${CONTEXT}"
          docker push "${IMAGE}"
