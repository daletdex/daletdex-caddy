# Canonical Harbor publish workflow — copy to repo as .github/workflows/docker-harbor.yml
# Standard secrets: HARBOR_REGISTRY, HARBOR_PROJECT, HARBOR_USERNAME, HARBOR_PASSWORD
# Deprecated fallbacks (remove after secrets migrated): HARBOR_HOST, HARBOR_USER

name: docker-harbor

on:
  push:
    tags: ["v*.*.*", "*.*.*"]
  workflow_dispatch:

concurrency:
  group: harbor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Harbor settings
        id: harbor
        shell: bash
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
        run: |
          set -euo pipefail
          REGISTRY="${HARBOR_REGISTRY:-${HARBOR_HOST:-}}"
          PROJECT="${HARBOR_PROJECT:-}"
          if [[ -z "${REGISTRY}" ]]; then
            echo "Set HARBOR_REGISTRY (preferred) or deprecated HARBOR_HOST" >&2
            exit 1
          fi
          if [[ -z "${PROJECT}" ]]; then
            echo "HARBOR_PROJECT must be set" >&2
            exit 1
          fi
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="${REGISTRY%%/*}"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "project=${PROJECT}" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "IMAGE_TAG=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "This workflow only publishes images for Git tags (vX.Y.Z)." >&2
            exit 1
          fi

      - uses: docker/login-action@v4
        with:
          registry: ${{ steps.harbor.outputs.registry }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & push
        env:
          IMAGE_REPO: daletdex-caddy
          DOCKERFILE: docker/Dockerfile
          CONTEXT: .
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
          IMAGE="${{ steps.harbor.outputs.registry }}/${{ steps.harbor.outputs.project }}/${IMAGE_REPO}:${TAG}"
          docker build --pull -f "${DOCKERFILE}" -t "${IMAGE}" "${CONTEXT}"
          docker push "${IMAGE}"
