# Canonical Harbor publish — secrets: HARBOR_HOST, HARBOR_USER, HARBOR_PASS, HARBOR_PROJECT
# IMAGE_REPO must match repo name (e.g. daletdex-ltc-worker).
# Harbor tag == git tag. Push to main does NOT publish; push semver tag vX.Y.Z does.

name: docker-harbor

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: harbor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Harbor settings
        id: harbor
        shell: bash
        env:
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
        run: |
          set -euo pipefail
          REGISTRY="${HARBOR_HOST:-}"
          PROJECT="${HARBOR_PROJECT:-}"
          if [[ -z "${REGISTRY}" ]]; then
            echo "HARBOR_HOST must be set (hostname only, e.g. registry.example.com)" >&2
            exit 1
          fi
          if [[ -z "${PROJECT}" ]]; then
            echo "HARBOR_PROJECT must be set" >&2
            exit 1
          fi
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="${REGISTRY%%/*}"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "project=${PROJECT}" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Harbor publish requires a semver git tag (vX.Y.Z)." >&2
            exit 1
          fi
          echo "IMAGE_TAG=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ${{ steps.harbor.outputs.registry }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASS }}

      - name: Build & push
        env:
          IMAGE_REPO: daletdex-caddy
          DOCKERFILE: docker/Dockerfile
          CONTEXT: .
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
          IMAGE="${{ steps.harbor.outputs.registry }}/${{ steps.harbor.outputs.project }}/${IMAGE_REPO}:${TAG}"
          docker build --pull -f "${DOCKERFILE}" -t "${IMAGE}" "${CONTEXT}"
          docker push "${IMAGE}"
